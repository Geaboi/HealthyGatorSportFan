name: Django CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: HealthyGatorSportsFanDjango

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      DATABASE_URL: sqlite:///db.sqlite3
      REDIS_URL: redis://localhost:6379/0
      COLLEGE_FOOTBALL_API_KEY: dummy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            HealthyGatorSportsFanDjango/requirements.txt

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: python manage.py test
